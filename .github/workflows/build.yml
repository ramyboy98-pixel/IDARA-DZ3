name: Build IDARA DZ EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check project files
        shell: powershell
        run: |
          if (!(Test-Path "main.py")) { throw "main.py غير موجود في جذر المشروع" }
          if (!(Test-Path "database.py")) { throw "database.py غير موجود بجانب main.py" }
          if (!(Test-Path "ui")) { throw "مجلد ui غير موجود" }
          if (!(Test-Path "utils")) { throw "مجلد utils غير موجود" }
          Get-ChildItem -Name

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        shell: powershell
        run: |
          python -m PyInstaller main.py `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name "IDARA_DZ" `
            --paths "." `
            --hidden-import database `
            --hidden-import document_engine `
            --hidden-import print_manager `
            --hidden-import backup_manager `
            --hidden-import utils.paths `
            --hidden-import ui.dashboard_page `
            --hidden-import ui.documents_page `
            --hidden-import ui.archive_page `
            --hidden-import ui.customers_page `
            --hidden-import ui.services_page `
            --hidden-import ui.settings_page `
            --hidden-import ui.search_page `
            --hidden-import ui.splash_screen `
            --hidden-import ui.ux_widgets `
            --collect-all customtkinter `
            --add-data "assets;assets" `
            --add-data "templates;templates"

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: IDARA_DZ_EXE
          path: dist/*.exe
