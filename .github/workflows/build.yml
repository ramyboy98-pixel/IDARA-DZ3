name: build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check project files
        shell: pwsh
        run: |
          if (!(Test-Path "main.py")) { throw "main.py not found in project root" }
          if (!(Test-Path "database.py")) { throw "database.py not found in project root" }
          if (!(Test-Path "utils")) { throw "utils folder not found in project root" }
          if (!(Test-Path "ui")) { throw "ui folder not found in project root" }

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") {
            pip install -r requirements.txt
          }
          pip install pyinstaller

      - name: Build exe
        shell: pwsh
        run: |
          $addData = @()
          if (Test-Path "assets") { $addData += "--add-data"; $addData += "assets;assets" }
          if (Test-Path "templates") { $addData += "--add-data"; $addData += "templates;templates" }
          if (Test-Path "data") { $addData += "--add-data"; $addData += "data;data" }

          pyinstaller --noconfirm --onefile --windowed `
            --name "IDARA_DZ" `
            --hidden-import database `
            --hidden-import document_engine `
            --hidden-import print_manager `
            --hidden-import backup_manager `
            --hidden-import utils.paths `
            --hidden-import ui.dashboard_page `
            --hidden-import ui.documents_page `
            --hidden-import ui.archive_page `
            --hidden-import ui.customers_page `
            --hidden-import ui.services_page `
            --hidden-import ui.settings_page `
            --hidden-import ui.search_page `
            --hidden-import ui.splash_screen `
            --hidden-import ui.ux_widgets `
            @addData `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: IDARA_DZ_EXE
          path: dist/IDARA_DZ.exe
