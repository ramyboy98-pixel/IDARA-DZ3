name: Build IDARA DZ Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") {
            pip install -r requirements.txt
          }
          pip install pyinstaller

      - name: Verify required files
        shell: pwsh
        run: |
          $required = @(
            "main.py",
            "database.py",
            "document_engine.py",
            "ui",
            "utils",
            "installer\IDARA_DZ.iss"
          )

          foreach ($item in $required) {
            if (!(Test-Path $item)) {
              throw "Missing required item: $item"
            }
          }

      - name: Build fast onedir app with PyInstaller
        shell: pwsh
        run: |
          $addData = @()

          if (Test-Path "assets") {
            $addData += "--add-data=assets;assets"
          }

          if (Test-Path "templates") {
            $addData += "--add-data=templates;templates"
          }

          pyinstaller `
            --noconfirm `
            --clean `
            --windowed `
            --onedir `
            --name "IDARA DZ" `
            --hidden-import database `
            --hidden-import document_engine `
            --hidden-import backup_manager `
            --hidden-import print_manager `
            --hidden-import win32com `
            --hidden-import win32com.client `
            --collect-submodules win32com `
            --collect-submodules customtkinter `
            $addData `
            main.py

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\IDARA_DZ.iss"

      - name: Upload portable folder
        uses: actions/upload-artifact@v4
        with:
          name: IDARA_DZ_Portable_Folder
          path: dist/IDARA DZ/

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: IDARA_DZ_Setup
          path: installer/output/IDARA_DZ_Setup_v1.1.exe
