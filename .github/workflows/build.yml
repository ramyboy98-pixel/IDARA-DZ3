name: Build IDARA DZ EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "IDARA_DZ" --add-data "assets;assets" main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: IDARA_DZ_EXE
          path: dist/*.exe
